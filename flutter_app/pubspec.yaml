name: clover
description: Clover - AI Travel Intelligence Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # state management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # navigation
  go_router: ^13.2.0

  # networking
  dio: ^5.4.3

  # local storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # charts
  fl_chart: ^0.67.0

  # animations
  flutter_animate: ^4.5.0

  # image
  cached_network_image: ^3.3.1

  # utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
